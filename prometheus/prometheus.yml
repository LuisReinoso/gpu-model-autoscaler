global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'proxy'
    static_configs:
      - targets: ['proxy:8080']

  - job_name: 'vllm-workers'
    static_configs:
      - targets:
          - 'vllm-worker:8000'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']