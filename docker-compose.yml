services:
  vllm-worker:
    build: ./vllm-worker
    environment:
      - MODEL_NAME=${MODEL_NAME:-mistralai/Mistral-7B-Instruct-v0.3}
      - GPU_MODE=${GPU_MODE:-stub}
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    environment:
      - WORKER_URLS=http://vllm-worker:8000
      - PROXY_PORT=8080
      - MIN_WORKERS=1
      - MAX_WORKERS=8
      - SCALE_UP_THRESHOLD=3.0
      - SCALE_DOWN_THRESHOLD=0.3
      - COOLDOWN_SCALE_UP=60s
      - COOLDOWN_SCALE_DOWN=120s
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-stub}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:-}
      - LAMBDA_API_KEY=${LAMBDA_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-mistralai/Mistral-7B-Instruct-v0.3}
    depends_on:
      - vllm-worker

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

volumes:
  prometheus_data:
  grafana_data: